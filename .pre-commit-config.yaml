repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: unit tests
        entry: uv run --no-sync pytest tests/test_server.py -v --tb=short
        language: system
        pass_filenames: false
        always_run: true
